<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label>Digite aqui:</label><input type="text" ><br>
        <label>Escolha um número:</label><input type="number" min="0" max="99" step="5"><br>
        <label>Range:</label><input type="range" min="0" max="100" step="5"><br>
        <label>E-mail:</label><input type="email" ><br>
        <label>Url:</label><input type="url" ><br>
        <label>Date:</label><input type="date" ><br>
        <label>Week:</label><input type="week" ><br>
        <label>Month:</label><input type="month" ><br>
        <label>Time:</label><input type="time" ><br>
        <label>Checkbox:</label><input type="checkbox" ><br>
        <label>Radio:</label><input type="radio" name="option" value="1"> Opção 1
        <input type="radio" name="option" value="2"> Opção 2<br>
        <label>Hidden:</label><input type="hidden" name="hidden" value="value"><br>
        <label>File:</label><input type="file" ><br>
        <label>Color:</label><input type="color" ><br>
        <label>Search:</label><input type="search" ><br>
        <label>Button:</label><button type="submit">Enviar</button><br>
    </form>
</body>
</html>
